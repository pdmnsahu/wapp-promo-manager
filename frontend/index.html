<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WA Promo Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

<!-- ── Sidebar Navigation ──────────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">📲</span>
    <span class="brand-text">WA Promo</span>
  </div>
  <nav class="sidebar-nav">
    <a href="#" class="nav-item active" data-page="dashboard">
      <span class="nav-icon">⚡</span><span>Dashboard</span>
    </a>
    <a href="#" class="nav-item" data-page="customers">
      <span class="nav-icon">👥</span><span>Customers</span>
    </a>
    <a href="#" class="nav-item" data-page="occasions">
      <span class="nav-icon">🎉</span><span>Occasions</span>
    </a>
    <a href="#" class="nav-item" data-page="templates">
      <span class="nav-icon">✉️</span><span>Templates</span>
    </a>
    <a href="#" class="nav-item" data-page="compose">
      <span class="nav-icon">📤</span><span>Send Messages</span>
    </a>
    <a href="#" class="nav-item" data-page="logs">
      <span class="nav-icon">📋</span><span>Message Logs</span>
    </a>
    <a href="#" class="nav-item" data-page="settings">
      <span class="nav-icon">⚙️</span><span>Settings</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <span class="sidebar-version">v1.0.0 · Local</span>
  </div>
</aside>

<!-- ── Main Content ────────────────────────────────────────────────── -->
<div class="main-wrap">
  <header class="topbar">
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="topbar-title" id="pageTitle">Dashboard</div>
    <div class="topbar-right">
      <span class="clock" id="clockDisplay"></span>
    </div>
  </header>

  <main class="content" id="content">
    <!-- Pages are injected here by JS -->
    <div class="loading-screen">Loading…</div>
  </main>
</div>

<!-- ── Toast Notification ──────────────────────────────────────────── -->
<div class="toast-container" id="toastContainer"></div>

<!-- ── Modal ──────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/pages/dashboard.js"></script>
<script src="/js/pages/customers.js"></script>
<script src="/js/pages/occasions.js"></script>
<script src="/js/pages/templates.js"></script>
<script src="/js/pages/compose.js"></script>
<script src="/js/pages/logs.js"></script>
<script src="/js/pages/settings.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
